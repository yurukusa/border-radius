<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.layout{display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:16px}

.preview-area{background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;min-height:380px}
.preview-shape{background:linear-gradient(135deg,#3b82f6,#8b5cf6);width:250px;height:250px;transition:border-radius 0.15s;position:relative}
.corner-label{position:absolute;font-size:0.62rem;color:rgba(255,255,255,0.5);font-family:'Fira Code',monospace}
.cl-tl{top:4px;left:4px}.cl-tr{top:4px;right:4px}.cl-bl{bottom:4px;left:4px}.cl-br{bottom:4px;right:4px}

.controls{background:#161616;border:1px solid #222;border-radius:12px;padding:16px}
.ctrl-group{margin-bottom:14px}
.ctrl-group h3{font-size:0.78rem;color:#888;margin-bottom:8px;border-bottom:1px solid #222;padding-bottom:4px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ctrl-row label{font-size:0.72rem;color:#555;min-width:90px}
.ctrl-row input[type=range]{flex:1;accent-color:#3b82f6}
.ctrl-row .val{font-size:0.72rem;color:#4da6ff;font-family:'Fira Code',monospace;min-width:35px;text-align:right}
.unit-select{padding:4px 6px;border-radius:4px;border:1px solid #333;background:#0a0a0a;color:#888;font-size:0.72rem;outline:none}

.link-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.link-btn{padding:4px 12px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:0.72rem;cursor:pointer}
.link-btn.active{border-color:#3b82f6;color:#4da6ff;background:#1a2744}

.presets{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.size-row{display:flex;gap:8px;margin-bottom:10px}
.size-btn{flex:1;padding:5px;border-radius:6px;border:1px solid #333;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer;text-align:center}
.size-btn.active{border-color:#3b82f6;color:#4da6ff}

.output{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer;margin-bottom:16px}
.output:hover{border-color:#3b82f6}
.output pre{font-family:'Fira Code',monospace;font-size:0.82rem;color:#10b981;white-space:pre-wrap}
.output .hint{font-size:0.72rem;color:#555;margin-top:6px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:700px){.layout{grid-template-columns:1fr}}

<body>
<div class="container">
<h1>Border Radius</h1>
<p class="subtitle">Visual CSS border-radius generator. Drag sliders or pick a preset.</p>

<div class="presets">
  <button class="preset-btn" onclick="setAll(0)">Square</button>
  <button class="preset-btn" onclick="setAll(8)">Subtle</button>
  <button class="preset-btn" onclick="setAll(16)">Rounded</button>
  <button class="preset-btn" onclick="setAll(50,'%')">Circle</button>
  <button class="preset-btn" onclick="setCorners(30,0,30,0)">Diagonal</button>
  <button class="preset-btn" onclick="setCorners(50,0,0,0)">Leaf</button>
  <button class="preset-btn" onclick="setCorners(50,50,0,0)">Tab</button>
  <button class="preset-btn" onclick="setCorners(0,80,0,80)">Ticket</button>
  <button class="preset-btn" onclick="setCorners(25,75,25,75)">Blob</button>
  <button class="preset-btn" onclick="setCorners(40,10,40,10)">Pillow</button>
</div>

<div class="layout">
  <div class="preview-area">
    <div class="preview-shape" id="shape">
      <span class="corner-label cl-tl" id="lblTL">0</span>
      <span class="corner-label cl-tr" id="lblTR">0</span>
      <span class="corner-label cl-bl" id="lblBL">0</span>
      <span class="corner-label cl-br" id="lblBR">0</span>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl-group">
      <h3>Shape Size</h3>
      <div class="size-row">
        <button class="size-btn active" onclick="setSize(250,250,this)">Square</button>
        <button class="size-btn" onclick="setSize(300,180,this)">Wide</button>
        <button class="size-btn" onclick="setSize(180,280,this)">Tall</button>
      </div>
    </div>
    <div class="ctrl-group">
      <h3>Corners</h3>
      <div class="link-row">
        <button class="link-btn active" id="linkBtn" onclick="toggleLink()">🔗 Link All</button>
        <select class="unit-select" id="unit" onchange="update()"><option value="px">px</option><option value="%">%</option></select>
      </div>
      <div class="ctrl-row"><label>Top Left</label><input type="range" id="tl" min="0" max="150" value="0" oninput="onSlider('tl')"><span class="val" id="tlVal">0</span></div>
      <div class="ctrl-row"><label>Top Right</label><input type="range" id="tr" min="0" max="150" value="0" oninput="onSlider('tr')"><span class="val" id="trVal">0</span></div>
      <div class="ctrl-row"><label>Bottom Right</label><input type="range" id="br2" min="0" max="150" value="0" oninput="onSlider('br2')"><span class="val" id="br2Val">0</span></div>
      <div class="ctrl-row"><label>Bottom Left</label><input type="range" id="bl" min="0" max="150" value="0" oninput="onSlider('bl')"><span class="val" id="blVal">0</span></div>
    </div>
  </div>
</div>

<div class="output" onclick="copyCSS()">
  <pre id="cssOutput"></pre>
  <div class="hint">Click to copy CSS</div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/border-radius">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
let linked=true;

function toggleLink(){
  linked=!linked;
  const btn=document.getElementById('linkBtn');
  btn.classList.toggle('active',linked);
  btn.textContent=linked?'🔗 Link All':'🔓 Independent';
}

function onSlider(id){
  if(linked){
    const v=document.getElementById(id).value;
    ['tl','tr','br2','bl'].forEach(s=>document.getElementById(s).value=v);
  }
  update();
}

function setAll(v,unit){
  if(unit)document.getElementById('unit').value=unit;
  ['tl','tr','br2','bl'].forEach(s=>document.getElementById(s).value=v);
  update();
}

function setCorners(tl,tr,br,bl){
  document.getElementById('unit').value='px';
  document.getElementById('tl').value=tl;
  document.getElementById('tr').value=tr;
  document.getElementById('br2').value=br;
  document.getElementById('bl').value=bl;
  if(linked){linked=false;document.getElementById('linkBtn').classList.remove('active');document.getElementById('linkBtn').textContent='🔓 Independent'}
  update();
}

function setSize(w,h,btn){
  document.getElementById('shape').style.width=w+'px';
  document.getElementById('shape').style.height=h+'px';
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  update();
}

function update(){
  const tl=+document.getElementById('tl').value;
  const tr=+document.getElementById('tr').value;
  const br=+document.getElementById('br2').value;
  const bl=+document.getElementById('bl').value;
  const u=document.getElementById('unit').value;

  document.getElementById('tlVal').textContent=tl;
  document.getElementById('trVal').textContent=tr;
  document.getElementById('br2Val').textContent=br;
  document.getElementById('blVal').textContent=bl;

  document.getElementById('lblTL').textContent=tl+u;
  document.getElementById('lblTR').textContent=tr+u;
  document.getElementById('lblBR').textContent=br+u;
  document.getElementById('lblBL').textContent=bl+u;

  const radius=`${tl}${u} ${tr}${u} ${br}${u} ${bl}${u}`;
  document.getElementById('shape').style.borderRadius=radius;

  // Shorthand
  let css;
  if(tl===tr&&tr===br&&br===bl){
    css=`border-radius: ${tl}${u};`;
  }else if(tl===br&&tr===bl){
    css=`border-radius: ${tl}${u} ${tr}${u};`;
  }else{
    css=`border-radius: ${tl}${u} ${tr}${u} ${br}${u} ${bl}${u};`;
  }
  document.getElementById('cssOutput').textContent=css;
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent='CSS Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

update();
</script>
